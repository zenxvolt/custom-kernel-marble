name: Build Kernel marble (crDroid + Droidspaces) + Clang 21

on:
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/crdroidandroid/android_kernel_xiaomi_sm8450.git
  KERNEL_BRANCH: 16.0-marble

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bersihkan ruang disk runner (Maksimal)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: true

      - name: Tambah swap GIGANTIC 24GB (Bypass OOM Full LTO)
        run: |
          sudo fallocate -l 24G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install dependency build
        run: |
          sudo apt update
          sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk \
            gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            default-jdk gnupg flex bison gperf build-essential zip curl libc6-dev libncurses-dev \
            libx11-dev libreadline-dev libgl1 libgl1-mesa-dev make bc grep tofrodos \
            python3-markdown libxml2-utils xsltproc libtinfo6 kmod openssl libelf-dev pahole \
            libssl-dev libarchive-tools zstd rsync --fix-missing

      - name: Clone source kernel (${{ env.KERNEL_BRANCH }})
        run: |
          git clone --depth=1 -b "${{ env.KERNEL_BRANCH }}" "${{ env.KERNEL_REPO }}" kernel_marble
          cd kernel_marble
          make kernelversion

      - name: Download Clang 21 (r563880c) murni dari Google AOSP
        run: |
          mkdir clang-r563880c
          cd clang-r563880c
          git init
          git remote add origin https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
          git sparse-checkout init --cone
          git sparse-checkout set clang-r563880c
          git pull origin main --depth=1
          cd ..

      - name: Clone patch kABI Droidspaces
        run: git clone --depth=1 https://github.com/ravindu644/Droidspaces-OSS.git

      - name: Terapkan patch kABI Droidspaces (menggunakan 3_4_5)
        working-directory: kernel_marble
        run: |
          patch -p1 < ../Droidspaces-OSS/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_3_4_5.patch
          patch -p1 < ../Droidspaces-OSS/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch

      - name: Edit gki_defconfig untuk Droidspaces
        working-directory: kernel_marble
        run: |
          ./scripts/config --file arch/arm64/configs/gki_defconfig \
            --enable CONFIG_SYSVIPC \
            --enable CONFIG_POSIX_MQUEUE \
            --enable CONFIG_IPC_NS \
            --enable CONFIG_PID_NS \
            --enable CONFIG_DEVTMPFS \
            --enable CONFIG_NETFILTER_XT_MATCH_ADDRTYPE \
            --enable CONFIG_NETFILTER_XT_TARGET_REJECT \
            --enable CONFIG_NETFILTER_XT_TARGET_LOG \
            --enable CONFIG_NETFILTER_XT_MATCH_RECENT \
            --enable CONFIG_IP_SET \
            --enable CONFIG_IP_SET_HASH_IP \
            --enable CONFIG_IP_SET_HASH_NET \
            --enable CONFIG_NETFILTER_XT_SET \
            --enable CONFIG_TMPFS_POSIX_ACL \
            --enable CONFIG_TMPFS_XATTR

      - name: Compile kernel (Full LTO, Clang 21 Asli)
        run: |
          export PATH="${GITHUB_WORKSPACE}/clang-r563880c/clang-r563880c/bin:${PATH}"
          cd kernel_marble
          make -j2 ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out gki_defconfig
          make -j2 ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out

      - name: Setup Magiskboot dan Repack boot.img
        run: |
          echo "=> Mengunduh Magisk versi terbaru..."
          MAGISK_URL=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep "browser_download_url.*Magisk-v.*apk" | head -n 1 | cut -d '"' -f 4)
          curl -L -o magisk.apk "$MAGISK_URL"
          unzip -o magisk.apk -d magisk_ext
          
          echo "=> Menyiapkan magiskboot..."
          cp magisk_ext/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          echo "=> Mengekstrak stock_boot.zip..."
          unzip stock_boot.zip
          
          echo "=> Membongkar boot.img asli..."
          ./magiskboot unpack boot.img
          
          echo "=> Memasukkan kernel hasil compile..."
          cp kernel_marble/out/arch/arm64/boot/Image kernel
          
          echo "=> Merakit ulang boot.img..."
          ./magiskboot repack boot.img custom-boot.img

      - name: Upload Custom Boot Image
        uses: actions/upload-artifact@v7
        with:
          name: custom-boot-marble-crdroid-droidspaces-clang21
          path: custom-boot.img
          retention-days: 14
          if-no-files-found: error
