name: Build Kernel marble (Pure crDroid) + Auto Repack

on:
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/crdroidandroid/android_kernel_xiaomi_sm8450.git
  KERNEL_BRANCH: 16.0-marble
  # ==========================================================================
  # FIX #1 — CLANG VERSION MISMATCH (KRITIS):
  # Workflow lama pakai clang-r416183b = LLVM 12.x (era Android 13 / LineageOS 20).
  # Device kamu menjalankan kernel yang dikompilasi dengan clang 21.0.0 (r563880c):
  #   "clang version 21.0.0 ... based on r563880c"  ← dari Settings > About phone
  # Pakai clang yang jauh lebih tua berisiko:
  #   a) Compile error — source 16.0-marble bisa pakai fitur C++ yang hanya ada di LLVM 17+
  #   b) ABI drift — optimasi berbeda → struct layout bisa bergeser, modul vendor_dlkm gagal load
  # Solusi: pakai ZyCromerZ Clang 21.0.0 (drop-in replacement, diunduh via GitHub API).
  # Jika suatu saat ZyCromerZ tidak punya 21.0.0, ubah filter jq di step download.
  # ==========================================================================
  MSM_ARCH: waipio
  VARIANT: consolidate

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository (untuk mengambil stock_boot.zip)
        uses: actions/checkout@v4

      - name: Bersihkan ruang disk runner
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: false

      - name: Tambah swap (jaga-jaga OOM saat link kernel)
        run: |
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install dependency build
        run: |
          sudo apt update
          sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk \
            gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            default-jdk gnupg flex bison gperf build-essential zip curl jq libc6-dev libncurses-dev \
            libx11-dev libreadline-dev libgl1 libgl1-mesa-dev make bc grep tofrodos \
            python3-markdown libxml2-utils xsltproc libtinfo6 kmod openssl libelf-dev pahole \
            libssl-dev libarchive-tools zstd rsync --fix-missing

      - name: Clone source kernel (${{ env.KERNEL_BRANCH }})
        run: |
          git clone --depth=1 -b "${{ env.KERNEL_BRANCH }}" "${{ env.KERNEL_REPO }}" kernel_marble
          cd kernel_marble
          make kernelversion

      # -----------------------------------------------------------------------
      # FIX #1 (lanjutan) — Cache & download ZyCromerZ Clang 21.0.0
      # FIX #2 — actions/cache@v5 → @v4 (v5 belum tentu ada; v4 = versi stabil terakhir)
      # -----------------------------------------------------------------------
      - name: Cache Clang 21.0.0 (ZyCromerZ)
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: clang-toolchain
          key: zyc-clang-21.0.0-v1

      - name: Download Clang 21.0.0 — ZyCromerZ (jika cache miss)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p clang-toolchain

          echo "=> Mencari rilis ZyCromerZ Clang 21.0.0 via GitHub API..."
          RELEASE_JSON=$(curl -fsSL "https://api.github.com/repos/ZyCromerZ/Clang/releases" \
            | jq '[.[] | select(.tag_name | startswith("21.0.0"))] | .[0]')

          CLANG_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          CLANG_URL=$(echo "$RELEASE_JSON" \
            | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url')

          if [ -z "$CLANG_URL" ] || [ "$CLANG_URL" = "null" ]; then
            echo "::error::Tidak ditemukan rilis ZyCromerZ Clang 21.0.0."
            echo "::error::Cek https://github.com/ZyCromerZ/Clang/releases dan pin CLANG_URL secara manual jika perlu."
            exit 1
          fi

          echo "=> Mengunduh Clang ${CLANG_TAG}: ${CLANG_URL}"
          curl -L -o clang.tar.gz "$CLANG_URL"

          echo "=> Mengekstrak toolchain..."
          tar -C clang-toolchain -xzf clang.tar.gz

          # Beberapa tarball mengekstrak ke sub-folder; normalisasi ke root agar PATH konsisten
          if [ ! -f "clang-toolchain/bin/clang" ]; then
            SUBDIR=$(find clang-toolchain -maxdepth 1 -mindepth 1 -type d | head -1)
            if [ -n "$SUBDIR" ]; then
              echo "=> Sub-folder terdeteksi (${SUBDIR}), memindahkan ke root..."
              mv "$SUBDIR"/* clang-toolchain/
              rmdir "$SUBDIR" 2>/dev/null || true
            fi
          fi

          rm clang.tar.gz
          echo "=> Verifikasi toolchain:"
          clang-toolchain/bin/clang --version

      # =====================================================================
      # PERBAIKAN UTAMA (tidak berubah dari versi asli — sudah benar):
      # Build resmi crDroid untuk kernel ini TIDAK hanya pakai gki_defconfig
      # polos. File build.config.msm.gki & build.config.msm.waipio di repo
      # kernel ini menggabungkan fragment tambahan di atas gki_defconfig:
      #   - arch/arm64/configs/vendor/<MSM_ARCH>_GKI.config        (selalu)
      #   - arch/arm64/configs/consolidate.fragment                (variant consolidate)
      #   - arch/arm64/configs/vendor/<MSM_ARCH>_consolidate.config (variant consolidate)
      # Tanpa langkah ini, kernel yang dihasilkan kemungkinan besar berbeda
      # Kconfig/ABI-nya dari kernel yang sebenarnya dipakai build resmi crDroid
      # -> driver platform Xiaomi/Qualcomm bisa hilang, dan/atau modul
      # vendor_dlkm yang sudah terpasang bisa gagal di-load.
      # =====================================================================
      - name: Gabungkan defconfig GKI + fragment platform waipio
        working-directory: kernel_marble
        run: |
          set -euo pipefail
          make ARCH=arm64 O=out gki_defconfig

          FRAGMENTS=("arch/arm64/configs/vendor/${MSM_ARCH}_GKI.config")
          if [ "${VARIANT}" = "consolidate" ]; then
            FRAGMENTS+=("arch/arm64/configs/consolidate.fragment")
            FRAGMENTS+=("arch/arm64/configs/vendor/${MSM_ARCH}_consolidate.config")
          fi

          for f in "${FRAGMENTS[@]}"; do
            if [ -f "$f" ]; then
              echo "=> Menggabungkan fragment: $f"
              ./scripts/kconfig/merge_config.sh -m -O out out/.config "$f"
            else
              echo "::warning::Fragment '$f' tidak ditemukan di branch ${{ env.KERNEL_BRANCH }}."
              echo "::warning::Cek ulang nama file di arch/arm64/configs/vendor/ pada repo kernel,"
              echo "::warning::karena tanpa fragment ini hasil build kemungkinan tidak cocok dengan build resmi crDroid."
            fi
          done

      - name: Ganti Full LTO ke ThinLTO (Mencegah OOM di vmlinux)
        working-directory: kernel_marble
        run: |
          ./scripts/config --file out/.config \
            --disable CONFIG_LTO_CLANG_FULL \
            --enable CONFIG_LTO_CLANG_THIN

      # FIX #1 (lanjutan) — PATH sekarang menunjuk ke clang-toolchain, bukan clang-r416183b
      - name: Compile kernel (gki_defconfig + fragment resmi, tanpa fitur tambahan)
        run: |
          export PATH="${GITHUB_WORKSPACE}/clang-toolchain/bin:${PATH}"
          cd kernel_marble
          make -j"$(nproc)" ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out olddefconfig
          make -j"$(nproc)" ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out

      - name: Setup Magiskboot dan Repack boot.img
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "=> Mengunduh Magisk versi terbaru..."
          MAGISK_URL=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | jq -r '.assets[] | select(.name | test("Magisk-v.*\\.apk$")) | .browser_download_url' \
            | head -n 1)

          if [ -z "${MAGISK_URL}" ] || [ "${MAGISK_URL}" = "null" ]; then
            echo "::error::Gagal mendapatkan URL APK Magisk dari GitHub API (cek rate limit/format response)."
            exit 1
          fi

          curl -L -o magisk.apk "$MAGISK_URL"
          unzip -o magisk.apk -d magisk_ext

          echo "=> Menyiapkan magiskboot..."
          cp magisk_ext/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

          echo "=> Mengekstrak stock_boot.zip..."
          # PENTING: boot.img di dalam stock_boot.zip HARUS diambil dari build
          # crDroid 16.0/marble yang SAMA dengan yang sedang/akan terpasang di
          # device (bukan boot.img stock MIUI/HyperOS), agar ramdisk & cmdline
          # tetap cocok dengan vendor_boot/vendor_dlkm yang sudah ada.
          unzip stock_boot.zip

          echo "=> Membongkar boot.img asli..."
          ./magiskboot unpack boot.img

          echo "=> Memasukkan kernel hasil compile..."
          cp kernel_marble/out/arch/arm64/boot/Image kernel

          echo "=> Merakit ulang boot.img..."
          ./magiskboot repack boot.img custom-boot.img

      # FIX #3 — actions/upload-artifact@v7 TIDAK EXIST → diganti @v4 (BLOCKER utama!)
      - name: Upload Custom Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: custom-boot-marble-pure-crdroid
          path: custom-boot.img
          retention-days: 14
          if-no-files-found: error
