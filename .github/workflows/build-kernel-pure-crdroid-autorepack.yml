name: Build Kernel marble (Pure crDroid) + Auto Repack

on:
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/crdroidandroid/android_kernel_xiaomi_sm8450.git
  KERNEL_BRANCH: 16.0-marble
  CLANG_REPO: https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git
  CLANG_BRANCH: lineage-20.0

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository (untuk mengambil stock_boot.zip)
        uses: actions/checkout@v4

      - name: Bersihkan ruang disk runner
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: false

      - name: Tambah swap (jaga-jaga OOM saat link kernel)
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install dependency build
        run: |
          sudo apt update
          sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk \
            gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            default-jdk gnupg flex bison gperf build-essential zip curl libc6-dev libncurses-dev \
            libx11-dev libreadline-dev libgl1 libgl1-mesa-dev make bc grep tofrodos \
            python3-markdown libxml2-utils xsltproc libtinfo6 kmod openssl libelf-dev pahole \
            libssl-dev libarchive-tools zstd rsync --fix-missing

      - name: Clone source kernel (${{ env.KERNEL_BRANCH }})
        run: |
          git clone --depth=1 -b "${{ env.KERNEL_BRANCH }}" "${{ env.KERNEL_REPO }}" kernel_marble
          cd kernel_marble
          make kernelversion

      - name: Cache toolchain Clang
        id: clang-cache
        uses: actions/cache@v5
        with:
          path: clang-r416183b
          key: clang-${{ env.CLANG_BRANCH }}

      - name: Clone toolchain Clang (kalau cache miss)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: git clone --depth=1 -b "${{ env.CLANG_BRANCH }}" "${{ env.CLANG_REPO }}" clang-r416183b

      - name: Ganti Full LTO ke ThinLTO (Mencegah OOM di vmlinux)
        working-directory: kernel_marble
        run: |
          ./scripts/config --file arch/arm64/configs/gki_defconfig \
            --disable CONFIG_LTO_CLANG_FULL \
            --enable CONFIG_LTO_CLANG_THIN

      - name: Compile kernel (Murni tanpa modifikasi)
        run: |
          export PATH="${GITHUB_WORKSPACE}/clang-r416183b/bin:${PATH}"
          cd kernel_marble
          make -j"$(nproc)" ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out gki_defconfig
          make -j"$(nproc)" ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out

      - name: Setup Magiskboot dan Repack boot.img
        run: |
          echo "=> Mengunduh Magisk versi terbaru..."
          MAGISK_URL=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep "browser_download_url.*Magisk-v.*apk" | head -n 1 | cut -d '"' -f 4)
          curl -L -o magisk.apk "$MAGISK_URL"
          unzip -o magisk.apk -d magisk_ext
          
          echo "=> Menyiapkan magiskboot..."
          cp magisk_ext/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          echo "=> Mengekstrak stock_boot.zip..."
          unzip stock_boot.zip
          
          echo "=> Membongkar boot.img asli..."
          ./magiskboot unpack boot.img
          
          echo "=> Memasukkan kernel hasil compile..."
          cp kernel_marble/out/arch/arm64/boot/Image kernel
          
          echo "=> Merakit ulang boot.img..."
          ./magiskboot repack boot.img custom-boot.img

      - name: Upload Custom Boot Image
        uses: actions/upload-artifact@v7
        with:
          name: custom-boot-marble-pure-crdroid
          path: custom-boot.img
          retention-days: 14
          if-no-files-found: error
